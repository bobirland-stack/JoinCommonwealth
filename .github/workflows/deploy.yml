# Build the Next.js static export and deploy it to GitHub Pages.
#
# The site is served from a subpath (/JoinCommonwealth), so the build runs
# with GITHUB_PAGES=true, which flips on basePath/assetPrefix in
# next.config.ts. A .nojekyll file is added to the output so GitHub Pages
# serves Next's _next/ asset folder (Jekyll otherwise strips leading-
# underscore paths).
#
# One-time manual step to turn Pages on: repo Settings -> Pages -> Build and
# deployment -> Source: "GitHub Actions". After that, every push to main
# publishes to https://bobirland-stack.github.io/JoinCommonwealth/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          # URL of the serverless flag function (Phase 7). Set as a repository
          # variable under Settings -> Secrets and variables -> Actions ->
          # Variables. Empty until the function is deployed; the flag flow stays
          # honest about that.
          NEXT_PUBLIC_FLAG_ENDPOINT: ${{ vars.FLAG_ENDPOINT }}

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
